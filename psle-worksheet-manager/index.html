<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSLE 2026 Worksheet Manager</title>
  <link rel="stylesheet" href="style.css?v=18" />
</head>
<body>

  <!-- =====================================================================
       Top navigation bar
  ====================================================================== -->
  <header class="app-header">
    <div class="app-header__brand">
      <div class="app-header__logo">WM</div>
      <div class="app-header__title">
        <span class="app-header__name">Worksheet Manager</span>
        <span class="app-header__sub">PSLE 2026 &mdash; MOE Syllabus</span>
      </div>
    </div>

    <nav class="app-nav" role="navigation" aria-label="Main navigation">
      <button class="nav-btn active" data-view="library" aria-current="page">
        <span class="nav-icon" aria-hidden="true">&#9776;</span> Library
      </button>
      <button class="nav-btn" data-view="builder">
        <span class="nav-icon" aria-hidden="true">&#43;</span> New Worksheet
      </button>
      <button class="nav-btn" data-view="questionbank">
        <span class="nav-icon" aria-hidden="true">&#10067;</span> Question Bank
      </button>
      <button class="nav-btn" data-view="students"><span aria-hidden="true">&#128100;</span> Students</button>
    </nav>

    <div class="app-header__actions">
      <div id="active-student-indicator"></div>
      <button class="icon-btn" id="btn-export" title="Export backup" aria-label="Export backup as JSON">&#8595; Export</button>
      <button class="icon-btn" id="btn-import" title="Import backup" aria-label="Import backup from JSON">&#8593; Import</button>
      <input type="file" id="import-file-input" accept=".json" style="display:none" aria-hidden="true" />
    </div>
  </header>

  <!-- =====================================================================
       Main content — views are swapped in here by the router
  ====================================================================== -->
  <main class="app-main" id="app-main">
    <!-- Populated by app.js -->
  </main>

  <!-- =====================================================================
       Toast notification
  ====================================================================== -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <!-- =====================================================================
       Scripts — order matters: data → storage → modules → router
  ====================================================================== -->
  <script src="data/syllabus.js?v=18"></script>
  <script src="modules/utils.js?v=18"></script>
  <script src="modules/storage.js?v=18"></script>
  <script src="modules/students.js?v=18"></script>
  <script src="modules/library.js?v=18"></script>
  <script src="modules/builder.js?v=18"></script>
  <script src="modules/preview.js?v=18"></script>
  <script src="modules/questionbank.js?v=18"></script>
  <script src="app.js?v=18"></script>

</body>
</html>
